<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль — NeoPlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">NEO<span class="gold">PLAY</span></div>
        <nav>
            <a href="index.html">🏠 Главная</a>
            <a href="catalog.html">📦 Каталог</a>
            <a href="exchange.html">🔄 Биржа</a>
            <a href="badges.html">🏆 Значки</a>
            <a href="profile.html">👤 Профиль</a>
        </nav>
    </header>

    <main>
        <h1 class="page-title">👤 Мой профиль</h1>
        <div class="profile-card">
            <p>📧 Логин: <span id="username">Пользователь</span></p>
            <p>💰 Баланс: <span id="balance">0 ₽</span></p>
            <p>📊 Сделок: <span id="dealsCount">0</span></p>
            <button class="btn" id="logoutBtn">Выйти</button>
        </div>
    </main>

    <footer>
        <p>Ваши данные в безопасности</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
<h2 id="userNick"></h2>
<span id="ownerBadge" style="color:gold; display:none;">👑 Владелец</span>

<script>
    const user = JSON.parse(localStorage.getItem("neoPlay_currentUser"));
    if (user) {
        document.getElementById("userNick").innerText = user.username;
        if (user.isOwner) {
            document.getElementById("ownerBadge").style.display = "inline";
        }
    }
</script>
