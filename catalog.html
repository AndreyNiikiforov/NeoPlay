<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог NeoPlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo" onclick="location.href='index.html'">NEO<span class="play">PLAY</span></div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="exchange.html">Биржа</a>
                <a href="badges.html">Значки</a>
                <a href="profile.html">Профиль</a>
                <a href="wallet.html">Кошелёк</a>
            </nav>
            <div class="auth-links" id="authLinks"></div>
        </div>
    </header>

    <main class="container" style="padding: 40px 20px;">
        <h1 style="color:#FFD700;">📦 Каталог товаров</h1>
        
        <!-- Кнопка создания объявления -->
        <button id="createListingBtn" class="btn-glow" style="margin: 20px 0;">➕ Создать объявление</button>
        
        <!-- Сетка товаров -->
        <div id="listingsGrid" class="badges-grid"></div>
    </main>

    <footer>...</footer>

    <script>
        const COMMISSION = 0.04; // 4% комиссия платформы
        
        function updateUI() {
            const user = JSON.parse(localStorage.getItem('neoPlay_currentUser'));
            const authLinks = document.getElementById('authLinks');
            if (user) {
                authLinks.innerHTML = `<span class="balance">${user.balance || 0} ₽</span>`;
            } else {
                authLinks.innerHTML = `<a href="login.html">Вход</a><a href="register.html">Регистрация</a>`;
            }
        }
        
        function renderListings() {
            const listings = JSON.parse(localStorage.getItem('neoPlay_listings')) || [];
            const container = document.getElementById('listingsGrid');
            if (listings.length === 0) {
                container.innerHTML = '<p style="text-align:center; width:100%;">Нет товаров. Создайте первое объявление!</p>';
                return;
            }
            container.innerHTML = listings.map(l => `
                <div class="badge-card" style="width: 280px;">
                    <h3>${l.title}</h3>
                    <p>${l.description}</p>
                    <div class="price">${l.price} ₽</div>
                    <p style="font-size:12px; color:#888;">Продавец: ${l.seller}</p>
                    <p style="font-size:11px; color:#FFD700;">Комиссия: ${Math.floor(l.price * COMMISSION)} ₽</p>
                    <button class="btn-outline" onclick="buyItem(${l.id})">Купить</button>
                </div>
            `).join('');
        }

        window.buyItem = (id) => {
            const user = JSON.parse(localStorage.getItem('neoPlay_currentUser'));
            if (!user) { alert('Войдите в профиль'); location.href='login.html'; return; }
            const listings = JSON.parse(localStorage.getItem('neoPlay_listings')) || [];
            const item = listings.find(l => l.id === id);
            if (!item) return;
            
            const totalPrice = item.price;
            const commissionAmount = Math.floor(totalPrice * COMMISSION);
            const sellerGets = totalPrice - commissionAmount;
            
            if (user.balance < totalPrice) { alert('Недостаточно средств'); location.href='wallet.html'; return; }
            
            // Списание с покупателя
            user.balance -= totalPrice;
            localStorage.setItem('neoPlay_currentUser', JSON.stringify(user));
            
            // Начисление продавцу
            let users = JSON.parse(localStorage.getItem('neoPlay_users')) || [];
            const sellerIndex = users.findIndex(u => u.username === item.seller);
            if (sellerIndex !== -1) {
                users[sellerIndex].balance = (users[sellerIndex].balance || 0) + sellerGets;
                localStorage.setItem('neoPlay_users', JSON.stringify(users));
            }
            
            // Запись сделки
            const deals = JSON.parse(localStorage.getItem('neoPlay_deals')) || [];
            deals.push({
                id: Date.now(),
                item: item.title,
                price: totalPrice,
                commission: commissionAmount,
                seller: item.seller,
                buyer: user.username,
                date: new Date().toISOString()
            });
            localStorage.setItem('neoPlay_deals', JSON.stringify(deals));
            
            // Удаляем объявление
            const newListings = listings.filter(l => l.id !== id);
            localStorage.setItem('neoPlay_listings', JSON.stringify(newListings));
            
            alert(`✅ Товар "${item.title}" куплен!\n💰 Продавец получил ${sellerGets} ₽\n📊 Комиссия NeoPlay: ${commissionAmount} ₽`);
            renderListings();
            updateUI();
        };

        document.getElementById('createListingBtn')?.addEventListener('click', () => {
            const user = JSON.parse(localStorage.getItem('neoPlay_currentUser'));
            if (!user) { alert('Войдите в профиль'); location.href='login.html'; return; }
            
            const title = prompt('Название товара:');
            if (!title) return;
            const description = prompt('Описание:');
            const price = parseInt(prompt('Цена в рублях:'));
            if (isNaN(price) || price < 10) { alert('Цена должна быть от 10 ₽'); return; }
            
            const listings = JSON.parse(localStorage.getItem('neoPlay_listings')) || [];
            listings.push({
                id: Date.now(),
                title, description, price,
                seller: user.username,
                date: new Date().toISOString()
            });
            localStorage.setItem('neoPlay_listings', JSON.stringify(listings));
            alert('✅ Объявление создано!');
            renderListings();
        });

        renderListings();
        updateUI();
    </script>
</body>
</html>
