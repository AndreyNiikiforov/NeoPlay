<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NeoPlay — игровой маркетплейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo" onclick="location.href='index.html'">NEO<span class="play">PLAY</span></div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="exchange.html">Биржа</a>
                <a href="badges.html">Значки</a>
                <a href="profile.html">Профиль</a>
                <a href="wallet.html">Кошелёк</a>
                <a href="admin.html" id="adminLink" style="display:none;">Админ</a>
            </nav>
            <div class="auth-links">
                <a href="login.html" id="loginLink">Вход</a>
                <a href="register.html" id="registerLink">Регистрация</a>
                <span id="userBalance" class="balance" style="display:none;">0 ₽</span>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>РОЗЫГРЫШ <span class="gold">АБСОЛЮТА</span></h1>
                <div class="hero-badge">💎</div>
                <div class="hero-sub">0% КОМИССИИ НАВСЕГДА</div>
                <p class="hero-text">Участвуй в розыгрыше и получай топовые награды</p>
                <button class="btn-glow" id="giveawayBtn">УЧАСТВОВАТЬ</button>
            </div>
        </section>

        <section class="badges-section">
            <div class="container">
                <h2 class="section-title">КОЛЛЕКЦИОННЫЕ ЗНАЧКИ</h2>
                <div class="badges-grid" id="badgesGrid"></div>
            </div>
        </section>

        <section class="stats">
            <div class="container">
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="policy.html">Политика</a>
                <a href="offer.html">Оферта</a>
                <a href="support.html">Поддержка</a>
            </div>
            <div class="footer-copy">© 2025 NeoPlay</div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        function renderBadges() {
            const badges = [
                { name: 'ОБЫЧНЫЙ', icon: '⚪', price: 19, color: '#888' },
                { name: 'РЕДКИЙ', icon: '🟣', price: 99, color: '#AA66FF' },
                { name: 'ЭЛИТНЫЙ', icon: '🔴', price: 499, color: '#FF4444' },
                { name: 'АБСОЛЮТ', icon: '💎', price: 999, color: '#FFD700', absolute: true }
            ];
            const container = document.getElementById('badgesGrid');
            container.innerHTML = badges.map(b => `
                <div class="badge-card ${b.absolute ? 'absolute' : ''}" style="border-color:${b.color}">
                    <div class="badge-icon">${b.icon}</div>
                    <h3>${b.name}</h3>
                    <p>от ${b.price} ₽</p>
                    <button class="btn-outline" onclick="location.href='catalog.html'">В КАТАЛОГ</button>
                </div>
            `).join('');
        }

        function renderStats() {
            const users = JSON.parse(localStorage.getItem('neoPlay_users')) || [];
            const deals = JSON.parse(localStorage.getItem('neoPlay_deals')) || [];
            const reviews = JSON.parse(localStorage.getItem('neoPlay_reviews')) || [];
            const avgRating = reviews.length ? (reviews.reduce((a,b)=>a+b.rating,0)/reviews.length).toFixed(1) : '5.0';
            
            const stats = [
                { number: users.length + 'K+', label: 'Активных пользователей' },
                { number: deals.length + 'K+', label: 'Проданных предметов' },
                { number: avgRating, label: 'Средняя оценка' },
                { number: '24/7', label: 'Поддержка' }
            ];
            document.getElementById('statsGrid').innerHTML = stats.map(s => `
                <div class="stat-item">
                    <div class="stat-number">${s.number}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            `).join('');
        }

        function updateUI() {
            const user = JSON.parse(localStorage.getItem('neoPlay_currentUser'));
            const loginLink = document.getElementById('loginLink');
            const registerLink = document.getElementById('registerLink');
            const userBalance = document.getElementById('userBalance');
            const adminLink = document.getElementById('adminLink');
            
            if (user) {
                loginLink.style.display = 'none';
                registerLink.style.display = 'none';
                userBalance.style.display = 'inline-block';
                userBalance.innerText = `${user.balance || 0} ₽`;
                if (user.isOwner) adminLink.style.display = 'inline-block';
            } else {
                loginLink.style.display = 'inline-block';
                registerLink.style.display = 'inline-block';
                userBalance.style.display = 'none';
            }
        }

        document.getElementById('giveawayBtn')?.addEventListener('click', () => {
            const user = JSON.parse(localStorage.getItem('neoPlay_currentUser'));
            if (!user) { alert('Войдите в профиль'); location.href='login.html'; return; }
            if ((user.balance||0) < 100) { alert('Недостаточно средств'); location.href='wallet.html'; return; }
            user.balance -= 100;
            localStorage.setItem('neoPlay_currentUser', JSON.stringify(user));
            const tickets = JSON.parse(localStorage.getItem('neoPlay_tickets')) || [];
            tickets.push({ username: user.username, phone: user.phone, date: new Date().toISOString() });
            localStorage.setItem('neoPlay_tickets', JSON.stringify(tickets));
            alert('Билет куплен! Итоги в 20:00');
            updateUI();
        });

        renderBadges();
        renderStats();
        updateUI();
    </script>
</body>
</html>
